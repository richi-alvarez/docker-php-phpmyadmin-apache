apiVersion: v1
kind: Pod
metadata:
  name: dev-wordpress-pod
  labels:
    app: dev-wordpress
spec:
  containers:
    - name: wordpress
      image: wordpress:latest
      ports:
        - containerPort: 80
      env:
        - name: WORDPRESS_DB_HOST
          value: "mariadb-service"   # <-- usa el nombre del servicio
        - name: WORDPRESS_DB_USER
          value: "root"
        - name: WORDPRESS_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mariadb-secret
              key: MYSQL_PASSWORD
        - name: WORDPRESS_DB_NAME
          valueFrom:
            secretKeyRef:
              name: mariadb-secret
              key: MYSQL_DATABASE
        - name: WORDPRESS_DEBUG
          value: "1"
        - name: WORDPRESS_CONFIG_EXTRA
          value: |
            define('WP_DEBUG', true);
            define('WP_DEBUG_LOG', true);
            define('WP_DEBUG_DISPLAY', false);
            define('FS_METHOD', 'direct');
      volumeMounts:
        - name: wordpress-data
          mountPath: /var/www/html
  volumes:
    - name: wordpress-data
      hostPath:
        path: /mnt/www