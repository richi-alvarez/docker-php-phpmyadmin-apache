apiVersion: v1
kind: Pod
metadata:
  name: dev-prestashop-pod
  labels:
    app: dev-prestashop
spec:
  containers:
    - name: prestashop
      image: prestashop/prestashop:8.2.3
      #image: prestashop/prestashop:8.2.4
      #image: prestashop/prestashop:9.0-apache
      imagePullPolicy: IfNotPresent # Evita descargar la imagen si ya está presente localmente
      restartPolicy: Always # Asegura que el contenedor se reinicie automáticamente si falla
      ports:
        - containerPort: 80
      env:
        - name: DB_SERVER
          value: "mariadb-service"  # <-- usa el nombre del servicio
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: mariadb-secret
              key: MYSQL_USER
        - name: DB_PASSWD
          valueFrom:
            secretKeyRef:
              name: mariadb-secret
              key: MYSQL_PASSWORD
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: mariadb-secret
              key: MYSQL_DATABASE
        - name: PS_FOLDER_ADMIN
          value: "admin4577"
        - name: PS_FOLDER_INSTALL
          value: "install4577"
        - name: PS_INSTALL_AUTO
          value: "1"
        - name: PS_DEV_MODE
          value: "1"
        - name: PS_LANGUAGE
          value: "es"
        - name: PS_COUNTRY
          value: "CO"
        - name: PS_TIMEZONE
          value: "America/Bogota"
        - name: PS_CURRENCY
          value: "COP"
        - name: ADMIN_MAIL
          value: "admin@example.com"
        - name: ADMIN_PASSWD
          value: "admin123"  
        - name: PS_DOMAIN
          value: "192.168.49.2:30083"
        - name: PS_SHOP_DOMAIN
          value: "192.168.49.2:30083"
        - name: PS_SHOP_DOMAIN_SSL
          value: "192.168.49.2:30083"
        - name: PS_SSL_ENABLED
          value: "0"
        - name: PS_SSL_ENABLED_EVERYWHERE
          value: "0"
      volumeMounts:
        - name: prestashop-data
          mountPath: /var/www/html
  volumes:
    - name: prestashop-data
      #hostPath:
        #path: /mnt/data/prestashop
      persistentVolumeClaim:
        claimName: prestashop-pvc